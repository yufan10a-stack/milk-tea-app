<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>今日奶茶局 🧋</title>
</head>

<body style="background:#111;color:#fff;font-family:-apple-system;padding:20px;">

<h2>🧋 今日奶茶局</h2>

<input id="name" placeholder="你的名字"><br><br>
<input id="drink" placeholder="饮品"><br><br>

<select id="sugar">
  <option value="全糖">全糖</option>
  <option value="半糖">半糖</option>
  <option value="无糖">无糖</option>
</select><br><br>

<input id="extra" placeholder="加料"><br><br>

<button onclick="submitOrder()">提交</button>

<h3>点单汇总</h3>
<div id="list"></div>

<script>
const API_URL = "https://mtyqxodgguexeyhgjgrs.supabase.co/rest/v1/orders";
const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10eXF4b2RnZ3VleGV5aGdqZ3JzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0Mzc0MDMsImV4cCI6MjA5MDAxMzQwM30.b5jsqibM_XQGkxSy8ermWk2v1PD-a46FzN_eXaw6PfQ";

async function submitOrder() {
  try {
    const name = document.getElementById("name").value;
    const drink = document.getElementById("drink").value;
    const sugar = document.getElementById("sugar").value;
    const extra = document.getElementById("extra").value;

    if (!name) {
      alert("请填写姓名");
      return;
    }

    await fetch(API_URL, {
      method: "POST",
      headers: {
        "apikey": API_KEY,
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json",
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({ name, drink, sugar, extra })
    });

    alert("提交成功 ✅");

    // 清空输入
    document.getElementById("name").value = "";
    document.getElementById("drink").value = "";
    document.getElementById("extra").value = "";

    loadOrders();

  } catch (err) {
    console.error(err);
    alert("出错：" + err.message);
  }
}

async function loadOrders() {
  const res = await fetch(API_URL, {
    headers: {
      "apikey": API_KEY,
      "Authorization": "Bearer " + API_KEY
    }
  });

  const data = await res.json();

  if (!Array.isArray(data)) return;

  document.getElementById("list").innerHTML =
    data.map(i =>
      `<div>${i.name} - ${i.drink} - ${i.sugar} + ${i.extra}</div>`
    ).join('');
}

loadOrders();
setInterval(loadOrders, 3000);
</script>

</body>
</html>
